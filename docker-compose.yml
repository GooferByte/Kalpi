version: "3.9"

services:
  # ── Go backend ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kalpi-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked at build time into next.config.mjs rewrites — must be the Docker-internal URL.
        - API_URL=http://api:8080
        - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    container_name: kalpi-frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
